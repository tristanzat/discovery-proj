apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dungeon-crawler-frontend
  namespace: dungeon-crawler
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: dungeon.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dungeon-crawler-frontend
                port:
                  number: 80